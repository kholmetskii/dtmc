name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: linux / ghc 9.10.3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LAPACK and BLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y libblas-dev liblapack-dev

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.10.3'
          cabal-version: 'latest'

      - name: Cache Cabal packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: linux-ghc-9.10.3-${{ hashFiles('dtmc.cabal', 'cabal.project', 'cabal.project.freeze') }}
          restore-keys: |
            linux-ghc-9.10.3-

      - run: cabal update

      - name: Build
        run: cabal build all --enable-tests --ghc-options=-Werror

      - name: Test
        run: cabal test all --test-show-details=direct --ghc-options=-Werror
