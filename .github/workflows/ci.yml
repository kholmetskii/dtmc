name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.3'
          cabal-version: '3.14.2.0'

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct
